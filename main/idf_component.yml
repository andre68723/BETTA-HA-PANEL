dependencies:
  idf: ">=5.5"
  espressif/esp_wifi_remote:
    version: "*"
    rules:
      - if: "target in [esp32p4]"
  lvgl/lvgl:
    version: "^9"
  # ---- Panel-variant-specific BSPs ----------------------------------------
  # 4" 720x720: Waveshare ESP32-P4 WiFi6 Touch LCD 4B + GT911 capacitive touch.
  waveshare/esp32_p4_wifi6_touch_lcd_4b:
    version: "^1.0.1"
    rules:
      - if: "target in [esp32p4] and idf.CONFIG_APP_PANEL_VARIANT_4INCH_720"
  espressif/esp_lcd_touch_gt911:
    version: "1.2.0~2"
    rules:
      - if: "target in [esp32p4] and idf.CONFIG_APP_PANEL_VARIANT_4INCH_720"
  # 10.1" 1280x800: Waveshare ESP32-P4 Nano (bundles its own BSP touch driver).
  waveshare/esp32_p4_nano:
    version: "^1.2.0"
    rules:
      - if: "target in [esp32p4] and idf.CONFIG_APP_PANEL_VARIANT_10INCH_1280"
  # ---- Shared dependencies ------------------------------------------------
  espressif/esp_lcd_touch:
    version: "^1.2.0"
    rules:
      - if: "target in [esp32p4]"
  joltwallet/littlefs:
    version: "^1.20.2"
  espressif/esp_hosted:
    version: "2.11.7"
    rules:
      - if: "target in [esp32p4]"
  espressif/esp_websocket_client:
    version: "*"
